{% extends "desktop/base.html" %}

{% block title %}Offline - {{ site_settings.shop_name }}{% endblock %}

{% block content %}
<section class="section">
    <div class="container" style="max-width: 720px;">
        <div style="background: var(--surface); border: 1px solid var(--border-light); border-radius: var(--radius-lg); padding: clamp(2rem, 5vw, 3.5rem); text-align: center; box-shadow: var(--shadow);">
            <div style="width: 88px; height: 88px; background: var(--brand-light); border-radius: 50%; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center;">
                <i class="ph-fill ph-wifi-slash" style="font-size: 2.75rem; color: var(--brand);"></i>
            </div>

            <h1 style="font-size: clamp(2rem, 4vw, 3rem); margin-bottom: 0.75rem;">You're offline</h1>
            <p style="max-width: 520px; margin: 0 auto 2rem; color: var(--text-secondary);">
                Don't worry. You can still browse cached pages, then try again when your connection is back.
            </p>

            <div style="display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center;">
                <a href="{% url 'menu:menu' %}" class="hero-btn-primary" style="text-decoration: none;">
                    <i class="ph-bold ph-fork-knife"></i>
                    Browse Menu
                </a>
                <button type="button" onclick="window.location.reload()" class="hero-btn-secondary" style="color: var(--text); border-color: var(--border);">
                    <i class="ph-bold ph-arrows-clockwise"></i>
                    Try Again
                </button>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
window.addEventListener('online', () => {
    window.location.reload();
});
</script>
{% endblock %}
