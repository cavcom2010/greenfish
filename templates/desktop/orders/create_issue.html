{% extends "desktop/base.html" %}

{% block title %}Report Order Issue - {{ site_settings.shop_name }}{% endblock %}

{% block content %}
<style>
.issue-page { max-width: 760px; margin: 0 auto; padding: 44px 20px; }
.issue-panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 28px; box-shadow: 0 1px 5px rgba(15,23,42,.05); }
.issue-panel h1 { margin: 0 0 8px; font-size: 28px; letter-spacing: 0; }
.issue-meta { color: #64748b; font-size: 14px; margin-bottom: 22px; }
.issue-panel label { display: block; font-weight: 800; margin: 16px 0 7px; color: #111827; }
.issue-panel select, .issue-panel textarea, .issue-panel input { width: 100%; border: 1px solid #d1d5db; border-radius: 8px; padding: 12px 14px; font: inherit; }
.issue-panel textarea { min-height: 150px; resize: vertical; }
.issue-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 22px; }
</style>

<main class="issue-page">
    <form class="issue-panel" method="post">
        {% csrf_token %}
        <h1>Report an issue</h1>
        <div class="issue-meta">Order #{{ order.order_number }} · £{{ order.total_amount }} · {{ order.created_at|date:"j M, H:i" }}</div>

        <label for="issueType">Issue type</label>
        <select id="issueType" name="issue_type" required>
            <option value="">Choose an issue</option>
            {% for value, label in issue_types %}
            <option value="{{ value }}">{{ label }}</option>
            {% endfor %}
        </select>

        <label for="description">What happened?</label>
        <textarea id="description" name="description" required minlength="10"></textarea>

        <label for="requestedRefundAmount">Refund amount requested</label>
        <input id="requestedRefundAmount" name="requested_refund_amount" type="number" min="0" max="{{ order.total_amount }}" step="0.01">

        <div class="issue-actions">
            <a href="{% url 'orders:tracking' order.order_number %}" class="btn btn-secondary">Back</a>
            <button class="btn btn-brand" type="submit">Send to team</button>
        </div>
    </form>
</main>
{% endblock %}
