{% extends "desktop/base.html" %}

{% block title %}Password Changed - {{ site_settings.shop_name }}{% endblock %}

{% block content %}
<section class="section">
    <div style="max-width: 460px; margin: 4rem auto; padding: 0 1rem; text-align: center;">
        <div class="auth-card-desktop" style="background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border-light); padding: 2.25rem;">
            <div style="width: 64px; height: 64px; background: var(--success-bg); border-radius: 50%; margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center;">
                <i class="ph-fill ph-check-circle" style="font-size: 1.9rem; color: var(--success);"></i>
            </div>
            <h1 style="font-size: 1.75rem; margin-bottom: 0.5rem;">Password changed</h1>
            <p style="color: var(--text-secondary); line-height: 1.55; margin-bottom: 1.75rem;">
                Your password has been updated. You can now sign in and continue ordering.
            </p>
            <a href="{% url 'account_login' %}" class="hero-btn-primary" style="width: 100%; justify-content: center; text-decoration: none;">
                Sign In
            </a>
        </div>
    </div>
</section>
{% endblock %}
