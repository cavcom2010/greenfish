{% extends "desktop/base.html" %}

{% block title %}Sign Out - {{ site_settings.shop_name }}{% endblock %}

{% block content %}

<section class="section">
    <div style="max-width: 440px; margin: 4rem auto; padding: 0 1rem; text-align: center;">
        <h1 style="margin-bottom: 0.5rem;">Sign Out</h1>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">Are you sure you want to sign out?</p>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="hero-btn-primary" style="background: var(--error); border: none; cursor: pointer; display: inline-flex;">
                <i class="ph-bold ph-sign-out"></i>
                Yes, Sign Out
            </button>
        </form>

        <div style="margin-top: 1.5rem;">
            <a href="{% url 'core:home' %}" style="color: var(--text-secondary); font-weight: 600; font-size: 0.9rem;">
                <i class="ph ph-arrow-left" style="vertical-align: middle; margin-right: 4px;"></i>
                Cancel and go home
            </a>
        </div>
    </div>
</section>

{% endblock %}
