<div class="order-card status-{{ order.status }}">
    <div class="order-header">
        <span class="order-number">#{{ order.order_number }}</span>
        <span class="order-time">{{ order.created_at|time:"H:i" }}</span>
    </div>

    <div class="order-customer">{{ order.customer_name }}</div>
    <div class="order-phone">{{ order.customer_phone }}</div>
    <div class="order-phone" style="margin-bottom: 8px;">{{ order.get_service_type_display }}</div>

    <div class="order-items">
        {% for item in order.items.all %}
        <div class="order-item">
            <span>{{ item.quantity }}x {{ item.item_name }}</span>
        </div>
        {% endfor %}
    </div>

    <div class="order-total">£{{ order.total_amount }}</div>
</div>
