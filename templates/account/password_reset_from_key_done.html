{% extends "base.html" %}
{% load static %}

{% block title %}Password Changed - {{ site_settings.shop_name }}{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/pages/auth.css' %}">
{% endblock %}

{% block content %}
<section class="auth-shell" style="text-align:center;">
    <div class="auth-card">
        <div class="auth-icon auth-icon--success">
            <i class="ph-fill ph-check-circle"></i>
        </div>
        <h1 style="font-size:var(--text-xl);margin-bottom:0.5rem;">Password changed</h1>
        <p style="color:var(--text-secondary);line-height:1.55;margin-bottom:1.75rem;">
            Your password has been updated. You can now sign in and continue ordering.
        </p>
        <a href="{% url 'account_login' %}" class="btn btn--primary btn--block">Sign In</a>
    </div>
</section>
{% endblock %}
