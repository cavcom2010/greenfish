{% extends "base.html" %}

{% block title %}Sign Out - {{ site_settings.shop_name }}{% endblock %}
{% block page_title %}Sign Out{% endblock %}

{% block location_picker %}{% endblock %}

{% block content %}
<div class="page-content" style="max-width: 400px; margin: 0 auto; padding: 60px 20px; text-align: center;">
    <div style="width: 80px; height: 80px; background: var(--error-bg); border-radius: 50%; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center;">
        <i class="ph-fill ph-sign-out" style="font-size: 40px; color: var(--error);"></i>
    </div>
    
    <h1 style="font-size: 24px; font-weight: 800; margin-bottom: 12px;">Sign Out</h1>
    <p style="color: var(--text-secondary); margin-bottom: 32px;">Are you sure you want to sign out?</p>

    <form method="post" action="{% url 'account_logout' %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-brand" style="width: 100%; margin-bottom: 12px;">
            Yes, Sign Out
        </button>
        <a href="{% url 'core:home' %}" class="btn btn-secondary" style="display: block;">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
