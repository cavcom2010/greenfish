{% extends "base.html" %}

{% block title %}Offline - {{ site_settings.shop_name }}{% endblock %}

{% block content %}
<section class="section">
    <div class="container" style="max-width:720px;">
        <div class="card card--padded">
            <div class="empty-state">
                <i class="ph-fill ph-wifi-slash" style="color:var(--brand);"></i>
                <h3>You're offline</h3>
                <p>Don't worry. You can still browse cached pages, then try again when your connection is back.</p>
                <div style="display:flex;gap:0.75rem;flex-wrap:wrap;justify-content:center;">
                    <a href="{% url 'menu:menu' %}" class="btn btn--primary">
                        <i class="ph-bold ph-fork-knife"></i>
                        Browse Menu
                    </a>
                    <button type="button" onclick="window.location.reload()" class="btn btn--secondary">
                        <i class="ph-bold ph-arrows-clockwise"></i>
                        Try Again
                    </button>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
window.addEventListener('online', () => {
    window.location.reload();
});
</script>
{% endblock %}
