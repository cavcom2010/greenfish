[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "django_messaging"
version = "0.1.0"
description = "Shared WhatsApp Cloud API messaging for Django projects"
requires-python = ">=3.10"
dependencies = []
classifiers = [
    "Programming Language :: Python :: 3",
    "Framework :: Django",
]

[tool.setuptools.packages.find]
where = ["."]
