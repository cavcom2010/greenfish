name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DJANGO_SECRET_KEY: ci-only-secret-key-not-used-in-production
      REDIS_URL: redis://127.0.0.1:6379/0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system checks
        run: python manage.py check

      - name: Verify migrations are up to date
        run: python manage.py makemigrations --check --dry-run

      - name: Run test suite
        run: python manage.py test --parallel auto

      - name: Production settings deploy check
        env:
          DJANGO_SETTINGS_MODULE: config.settings.production
          DJANGO_SECRET_KEY: ${{ github.sha }}-ci-strong-secret-key-for-deploy-check-only
          DJANGO_ALLOWED_HOSTS: ci.example.com
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          EMAIL_HOST: smtp.example.com
          EMAIL_HOST_USER: ci
          EMAIL_HOST_PASSWORD: ci
        run: python manage.py check --deploy
